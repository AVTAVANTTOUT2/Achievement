name: Demande de fonctionnalité
description: Proposer une amélioration de repoaudit
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème à résoudre
      description: Quel besoin concret cette fonctionnalité adresse-t-elle ?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposition
      description: Comportement souhaité, options CLI, exemples
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
      description: Autres approches ou outils déjà essayés
    validations:
      required: false
